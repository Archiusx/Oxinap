<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://i.ibb.co/XrMWBwQT/IMG-20260609-WA0033.jpg" />
  <title>CyIntel – Cyber Intelligence Portal</title>
  <meta name="description" content="Secure access portal for CyIntel — Karnataka Government Cyber Intelligence Platform. Authorized personnel only." />
  <style>
    #root:empty ~ #splash {
      display: flex;
    }
    #splash {
      display: none;
      position: fixed;
      inset: 0;
      background: #050d1a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: system-ui, sans-serif;
      color: #94a3b8;
      font-size: 13px;
    }
    #splash img { width: 48px; height: 48px; border-radius: 10px; }
    #splash-ring {
      width: 28px; height: 28px;
      border: 2px solid #1e3a5f;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="splash">
    <img src="https://i.ibb.co/XrMWBwQT/IMG-20260609-WA0033.jpg" alt="CyIntel" />
    <div id="splash-ring"></div>
    <span>Loading CyIntel…</span>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
